name: tsp_dashboard
description: TSP Dashboard for Slow Pour beverage cart operations.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State, routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.15.0
  firebase_auth: ^5.4.2
  cloud_firestore: ^5.6.4
  firebase_messaging: ^15.2.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Device + storage
  device_info_plus: ^11.3.0
  package_info_plus: ^8.3.0
  shared_preferences: ^2.3.3

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
